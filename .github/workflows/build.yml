name: Build TextMate Package

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type (release/debug)'
        required: false
        default: 'release'
        type: choice
        options:
        - release
        - debug

permissions:
  contents: read

jobs:
  build:
    runs-on: macos-latest

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Setup Ruby
      uses: ruby/setup-ruby@v1
      with:
        ruby-version: '3.2'
        bundler-cache: false

    - name: Install Homebrew dependencies
      run: |
        brew update
        brew install boost capnp google-sparsehash multimarkdown ninja ragel gdbm

    - name: Install Ruby DBM gem
      run: |
        # Install DBM gem with gdbm support
        gem install dbm
        # Verify dbm gem installation
        ruby -e "require 'dbm'; puts 'DBM gem loaded successfully'"

    - name: Configure
      run: |
        echo "Starting configuration..."
        ./configure
        echo "Configuration completed."

    - name: Build TextMate Package
      run: |
        echo "Starting build process..."
        echo "Build type: ${{ inputs.build_type || 'release' }}"

        # Build with error handling but ignore warnings
        set +e  # Don't fail on non-zero exit codes temporarily
        ninja TextMate
        build_status=$?
        set -e  # Re-enable failing on non-zero exit codes

        if [ $build_status -ne 0 ]; then
          echo "Build failed with exit code: $build_status"
          echo "Checking for partial build artifacts..."
          find ~/build -name "*TextMate*" -type f 2>/dev/null || echo "No TextMate artifacts found"
          exit $build_status
        else
          echo "Build completed successfully."
        fi

    - name: List build output
      run: |
        echo "Contents of build directory:"
        find ~/build -type f -name "*TextMate*" 2>/dev/null || echo "No TextMate files found"
        find ~/build -type d -name "*.app" 2>/dev/null || echo "No .app directories found"
        echo "Full build directory structure:"
        ls -la ~/build/ || echo "~/build not found"

    - name: Create package directory and collect artifacts
      run: |
        mkdir -p textmate-package

        # Find and copy the TextMate.app bundle
        if [ -d ~/build/TextMate/Applications/TextMate.app ]; then
          echo "Found TextMate.app in expected location"
          cp -R ~/build/TextMate/Applications/TextMate.app textmate-package/
        else
          echo "Searching for TextMate.app in build directory..."
          find ~/build -name "TextMate.app" -type d -exec cp -R {} textmate-package/ \; 2>/dev/null || echo "TextMate.app not found"
        fi

        # Copy any other built applications that might be useful
        find ~/build -name "*.app" -type d -not -path "*/textmate-package/*" -exec cp -R {} textmate-package/ \; 2>/dev/null || true

        # List what we packaged
        echo "Package contents:"
        ls -la textmate-package/ || echo "Package directory empty"

    - name: Upload TextMate Package
      uses: actions/upload-artifact@v4
      with:
        name: textmate-package-${{ github.sha }}
        path: textmate-package/
        if-no-files-found: warn
