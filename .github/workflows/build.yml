name: Build TextMate Package

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:
    inputs:
      build_type:
        description: Build type (release/debug)
        required: false
        default: release
        type: choice
        options:
          - release
          - debug

permissions:
  contents: read

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.4'
          bundler-cache: false

      - name: Cache Homebrew packages
        uses: actions/cache@v4
        with:
          path: |
            /usr/local/Cellar
            /usr/local/opt
            /usr/local/bin
            /usr/local/lib
            /usr/local/include
            ~/Library/Caches/Homebrew
          key: ${{ runner.os }}-homebrew-${{ hashFiles('**/configure', '**/README.md') }}-v1
          restore-keys: |
            ${{ runner.os }}-homebrew-

      - name: Install Homebrew dependencies
        run: |
          # Check if packages are already installed from cache
          if ! brew list boost capnp google-sparsehash multimarkdown ninja ragel gdbm > /dev/null 2>&1; then
            echo "Installing missing Homebrew dependencies..."
            brew update
            brew install boost capnp google-sparsehash multimarkdown ninja ragel gdbm
          else
            echo "All Homebrew dependencies already installed (from cache)"
          fi

      - name: Install Ruby DBM gem
        run: |
          gem install dbm
          ruby -e "require 'dbm'; puts 'DBM gem loaded successfully'"

      - name: Cache intermediate build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/build
            ~/.cache
          key: ${{ runner.os }}-build-${{ hashFiles('**/*.rave', '**/configure', 'Frameworks/**/*.cc', 'Frameworks/**/*.mm', 'Frameworks/**/*.h', 'Applications/**/*.cc', 'Applications/**/*.mm', 'Applications/**/*.h') }}-${{ inputs.build_type || 'release' }}-v1
          restore-keys: |
            ${{ runner.os }}-build-${{ inputs.build_type || 'release' }}-
            ${{ runner.os }}-build-

      - name: Configure
        run: |
          echo "Starting configuration..."
          ./configure
          echo "Configuration completed."

      - name: Build TextMate Package
        run: |
          echo "Starting build process..."
          echo "Build type: ${{ inputs.build_type }}"
          if ! ninja TextMate; then
            echo "Build failed. Searching for partial artifacts..."
            find ~/build -name "*TextMate*" -type f 2>/dev/null || echo "No TextMate artifacts found"
            exit 1
          fi
          echo "Build completed successfully."

      - name: List build output
        run: |
          echo "Contents of build directory:"
            find ~/build -type f -name "*TextMate*" 2>/dev/null || echo "No TextMate files found"
          find ~/build -type d -name "*.app" 2>/dev/null || echo "No .app directories found"
          echo "Full build directory structure:"
          ls -la ~/build/ || echo "~/build not found"

      - name: Collect artifacts
        run: |
          mkdir -p textmate-package
          if [ -d ~/build/TextMate/Applications/TextMate.app ]; then
            cp -R ~/build/TextMate/Applications/TextMate.app textmate-package/
          else
            find ~/build -name "TextMate.app" -type d -exec cp -R {} textmate-package/ \; 2>/dev/null || true
          fi
          find ~/build -name "*.app" -type d -not -path "*/textmate-package/*" -exec cp -R {} textmate-package/ \; 2>/dev/null || true
          echo "Package contents:"
          ls -la textmate-package/ || echo "Package directory empty"

      - name: Upload TextMate Package
        uses: actions/upload-artifact@v4
        with:
          name: textmate-package-${{ github.sha }}
          path: textmate-package/
          if-no-files-found: warn
